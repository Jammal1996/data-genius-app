global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:

  # ── DataGenius live on Render ──────────────────────────────────────────────
  # Scrapes the /metrics endpoint exposed by prometheus-flask-exporter
  - job_name: data-genius-render
    scheme: https
    static_configs:
      - targets: ["data-genius-ikwt.onrender.com"]
    metrics_path: /metrics
    scrape_interval: 30s   # be gentle on the free tier

  # ── Prometheus itself ──────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
