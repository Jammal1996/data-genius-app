# .github/workflows/ci-cd.yml
# Stages: test → build image → push to registry → deploy
# Supports: dev / staging / prod environments via branch names

name: CI/CD Pipeline — DataGenius

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: data-genius
  REGISTRY: ghcr.io/${{ github.repository_owner }}   # GitHub Container Registry
  # Swap to ECR:  <account>.dkr.ecr.<region>.amazonaws.com/data-genius
  # Swap to GCR:  gcr.io/<project>/data-genius

jobs:
  # ─── 1. Run tests ─────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=xml || true
          # Remove "|| true" once you have a tests/ directory

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ─── 2. Build & push Docker image ─────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'   # Only on direct pushes, not PRs

    permissions:
      contents: read
      packages: write   # needed for GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # For AWS ECR, replace with:
      # - uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx (multi-platform)
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3a. Deploy to DEV (on push to develop) ───────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.data-genius.example.com

    steps:
      - name: Deploy to Cloud Run (Dev)
        run: |
          echo "Deploying ${{ needs.build.outputs.image_tag }} to dev..."
          # gcloud run deploy data-genius-dev \
          #   --image ${{ needs.build.outputs.image_tag }} \
          #   --region us-central1 \
          #   --platform managed \
          #   --allow-unauthenticated \
          #   --set-env-vars FLASK_ENV=development

  # ─── 3b. Deploy to STAGING (on push to staging) ───────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.data-genius.example.com

    steps:
      - name: Deploy to Cloud Run (Staging)
        run: |
          echo "Deploying to staging..."

  # ─── 3c. Deploy to PRODUCTION (on push to main) ───────────────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://data-genius.example.com

    steps:
      - name: Deploy to Cloud Run (Production)
        run: |
          echo "Deploying to production..."
          # Uncomment one of the following based on your cloud provider:

          # ── Google Cloud Run ──
          # gcloud run deploy data-genius \
          #   --image ${{ needs.build.outputs.image_tag }} \
          #   --region us-central1 \
          #   --platform managed \
          #   --allow-unauthenticated \
          #   --min-instances 1 \
          #   --max-instances 10 \
          #   --memory 1Gi \
          #   --cpu 1 \
          #   --set-env-vars FLASK_ENV=production,SECRET_KEY=${{ secrets.SECRET_KEY }}

          # ── AWS ECS (update service with new image) ──
          # aws ecs update-service \
          #   --cluster data-genius-cluster \
          #   --service data-genius-service \
          #   --force-new-deployment

          # ── Azure Container Instances ──
          # az container create \
          #   --resource-group data-genius-rg \
          #   --name data-genius \
          #   --image ${{ needs.build.outputs.image_tag }} \
          #   --ports 8000 \
          #   --environment-variables FLASK_ENV=production
