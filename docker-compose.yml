# docker-compose.yml  — local development & staging simulation
# For production, push the image to ECR/GCR/ACR and deploy to ECS/Cloud Run/ACI
# (see deploy/cloud-deploy.md for cloud-specific instructions)

version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: data-genius:latest
    container_name: data_genius_app
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      # Persist uploaded files and generated charts between restarts
      - charts_data:/app/static/charts
      - uploads_data:/app/static/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: nginx reverse proxy for production-like setup
  nginx:
    image: nginx:alpine
    container_name: data_genius_nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    profiles:
      - with-nginx   # only starts with: docker compose --profile with-nginx up

volumes:
  charts_data:
  uploads_data:
